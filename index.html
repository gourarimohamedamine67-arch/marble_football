<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Football</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a1a;
  font-family:'Arial Black',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ---- MENU ---- */
#menu {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:20px;
}
#menu h1 {
  font-size:2.5em;
  color:#fff;
  text-shadow:0 0 30px #00ff88;
  letter-spacing:4px;
}
.section-label { color:#00ff88; font-size:.85em; letter-spacing:3px; }
.team-grid {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  max-width:600px;
}
.team-card {
  background:#1a1a2e;
  border:2px solid #333;
  border-radius:10px;
  padding:10px 16px;
  cursor:pointer;
  text-align:center;
  transition:all .2s;
  min-width:90px;
}
.team-card:hover { border-color:#00ff88; transform:scale(1.05); }
.team-card.selected { border-color:#00ff88; box-shadow:0 0 15px #00ff8866; background:#0d2b1a; }
.team-card .flag { font-size:1.8em; }
.team-card .name { color:#ccc; font-size:.75em; margin-top:4px; }
#startBtn {
  background:linear-gradient(135deg,#00ff88,#00cc66);
  border:none;
  border-radius:30px;
  padding:14px 50px;
  font-size:1.2em;
  font-weight:bold;
  color:#0a0a1a;
  cursor:pointer;
  letter-spacing:2px;
  margin-top:6px;
  transition:all .2s;
}
#startBtn:hover:not(:disabled) { transform:scale(1.05); box-shadow:0 0 30px #00ff8866; }
#startBtn:disabled { opacity:.35; cursor:not-allowed; }
.vs-row { display:flex; align-items:center; gap:16px; color:#555; font-size:.9em; }

/* ---- GAME ---- */
#gameWrapper { display:none; flex-direction:column; align-items:center; }
#scoreboard {
  display:flex;
  align-items:center;
  gap:24px;
  padding:10px 30px;
  background:#1a1a2e;
  border-radius:0 0 14px 14px;
  margin-bottom:8px;
}
.sc-team { display:flex; align-items:center; gap:8px; }
.sc-flag { font-size:1.8em; }
.sc-num { font-size:2.2em; font-weight:bold; min-width:28px; text-align:center; }
#s1 { color:#4af; }
#s2 { color:#fa4; }
#timer { color:#aaa; font-size:1.1em; text-align:center; min-width:55px; }
#phase { color:#00ff88; font-size:.7em; letter-spacing:2px; text-align:center; margin-top:2px; }
canvas { border-radius:10px; box-shadow:0 0 40px #00000099; display:block; }

/* ---- RESULT ---- */
#result {
  display:none;
  position:fixed; inset:0;
  background:#000c;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  z-index:999;
}
#result h2 { font-size:2.8em; color:#00ff88; text-shadow:0 0 40px #00ff88; text-transform:uppercase; text-align:center; }
#finalScore { font-size:2.2em; color:#fff; letter-spacing:8px; }
#replayBtn {
  background:#00ff88; border:none; border-radius:30px;
  padding:12px 40px; font-size:1.1em; font-weight:bold;
  color:#0a0a1a; cursor:pointer; margin-top:8px;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>⚽ MARBLE FOOTBALL</h1>

  <div class="section-label">ÉQUIPE 1</div>
  <div class="team-grid" id="grid1"></div>

  <div class="section-label">ÉQUIPE 2</div>
  <div class="team-grid" id="grid2"></div>

  <button id="startBtn" disabled onclick="startGame()">KICK OFF ▶</button>
</div>

<!-- GAME -->
<div id="gameWrapper">
  <div id="scoreboard">
    <div class="sc-team">
      <span class="sc-flag" id="f1">🇫🇷</span>
      <span class="sc-num" id="s1">0</span>
    </div>
    <div>
      <div id="timer">00:00</div>
      <div id="phase">1ÈRE MI-TEMPS</div>
    </div>
    <div class="sc-team">
      <span class="sc-num" id="s2">0</span>
      <span class="sc-flag" id="f2">🇧🇷</span>
    </div>
  </div>
  <canvas id="c"></canvas>
</div>

<!-- RESULT -->
<div id="result">
  <h2 id="winnerTxt"></h2>
  <div id="finalScore"></div>
  <button id="replayBtn" onclick="goMenu()">🔄 REJOUER</button>
</div>

<script>
// ===================== TEAMS =====================
const TEAMS = [
  { name:"France",     flag:"🇫🇷", col:"#1a6bdb", bord:"#ffffff" },
  { name:"Brésil",    flag:"🇧🇷", col:"#22c45e", bord:"#f5d020" },
  { name:"Espagne",   flag:"🇪🇸", col:"#d62828", bord:"#f9b200" },
  { name:"Allemagne", flag:"🇩🇪", col:"#444444", bord:"#f9b200" },
  { name:"Portugal",  flag:"🇵🇹", col:"#006600", bord:"#d62828" },
  { name:"Argentine", flag:"🇦🇷", col:"#74c0fc", bord:"#ffffff" },
  { name:"Maroc",     flag:"🇲🇦", col:"#c1121f", bord:"#006233" },
  { name:"Turquie",   flag:"🇹🇷", col:"#e63946", bord:"#ffffff" },
  { name:"Angleterre",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", col:"#ffffff", bord:"#cf142b" },
  { name:"Italie",    flag:"🇮🇹", col:"#0066cc", bord:"#009246" },
];

let sel1 = null, sel2 = null;

function buildGrids() {
  ['grid1','grid2'].forEach((id, gi) => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    TEAMS.forEach((t, i) => {
      const d = document.createElement('div');
      d.className = 'team-card';
      d.innerHTML = `<div class="flag">${t.flag}</div><div class="name">${t.name}</div>`;
      d.onclick = () => {
        el.querySelectorAll('.team-card').forEach(c => c.classList.remove('selected'));
        d.classList.add('selected');
        if (gi === 0) sel1 = i; else sel2 = i;
        document.getElementById('startBtn').disabled = (sel1 === null || sel2 === null || sel1 === sel2);
      };
      el.appendChild(d);
    });
  });
}
buildGrids();

// ===================== CANVAS =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive size
function setSize() {
  const maxW = Math.min(window.innerWidth - 20, 820);
  const maxH = Math.min(window.innerHeight - 140, 480);
  const ratio = 820/480;
  let W = maxW, H = maxW / ratio;
  if (H > maxH) { H = maxH; W = H * ratio; }
  canvas.width  = Math.floor(W);
  canvas.height = Math.floor(H);
}
setSize();
window.addEventListener('resize', () => { if (running) { setSize(); } });

// Field layout (recomputed each frame from canvas size)
function FL() {
  const W = canvas.width, H = canvas.height;
  const fx = Math.floor(W*0.075), fy = Math.floor(H*0.1);
  const fw = W - fx*2, fh = H - fy*2;
  const gh = Math.floor(fh * 0.32);
  const gy = fy + (fh - gh)/2;
  const gw = Math.floor(W * 0.022);
  return { W, H, fx, fy, fw, fh,
    GL: { x:fx-gw, y:gy, w:gw, h:gh },
    GR: { x:fx+fw, y:gy, w:gw, h:gh }
  };
}

// ===================== GAME STATE =====================
let marbles = [], ball = {};
let score1 = 0, score2 = 0;
let gameTime = 0, totalFrames = 0;
let running = false, rafId = null;
let flashTimer = 0, flashTeam = 0;
let kickWait = 0;
let lastTs = 0;

const TOTAL_SECONDS = 90; // real seconds = 90 min ingame

function rnd(a,b) { return a + Math.random()*(b-a); }
function rndS() { return Math.random()>.5?1:-1; }

function makeMarble(x, y, teamIdx) {
  return {
    x, y,
    vx: rnd(.3,1.5)*rndS(),
    vy: rnd(.3,1.5)*rndS(),
    ti: teamIdx,
    r: Math.floor(canvas.width * 0.014)
  };
}

function spawnMarbles() {
  const f = FL();
  const cx = f.fx + f.fw/2;
  marbles = [];
  for (let i = 0; i < 11; i++) {
    marbles.push(makeMarble(rnd(f.fx+15, cx-15), rnd(f.fy+15, f.fy+f.fh-15), sel1));
    marbles.push(makeMarble(rnd(cx+15, f.fx+f.fw-15), rnd(f.fy+15, f.fy+f.fh-15), sel2));
  }
}

function resetBall() {
  const f = FL();
  ball = {
    x: f.fx + f.fw/2,
    y: f.fy + f.fh/2,
    vx: rnd(.8,2)*rndS(),
    vy: rnd(.8,2)*rndS(),
    r: Math.floor(canvas.width * 0.018)
  };
  kickWait = 90;
}

function startGame() {
  if (sel1 === null || sel2 === null || sel1 === sel2) return;
  setSize();
  score1 = 0; score2 = 0; gameTime = 0;
  totalFrames = TOTAL_SECONDS * 60;
  running = true; flashTimer = 0;

  document.getElementById('s1').textContent = 0;
  document.getElementById('s2').textContent = 0;
  document.getElementById('f1').textContent = TEAMS[sel1].flag;
  document.getElementById('f2').textContent = TEAMS[sel2].flag;

  spawnMarbles();
  resetBall();

  document.getElementById('menu').style.display = 'none';
  document.getElementById('gameWrapper').style.display = 'flex';

  if (rafId) cancelAnimationFrame(rafId);
  lastTs = 0;
  rafId = requestAnimationFrame(loop);
}

function goMenu() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  sel1 = null; sel2 = null;
  buildGrids();
  document.getElementById('startBtn').disabled = true;
  document.getElementById('result').style.display = 'none';
  document.getElementById('gameWrapper').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

// ===================== LOOP =====================
function loop(ts) {
  if (!running) return;
  const dt = lastTs === 0 ? 1 : Math.min((ts - lastTs)/16.67, 3);
  lastTs = ts;

  gameTime += dt;
  if (gameTime >= totalFrames) { endGame(); return; }

  update(dt);
  draw();
  rafId = requestAnimationFrame(loop);
}

function update(dt) {
  // Timer display
  const pct = gameTime / totalFrames;
  const mins = Math.floor(pct * 90);
  const secs = Math.floor((pct * 90 - mins) * 60);
  document.getElementById('timer').textContent =
    String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
  document.getElementById('phase').textContent = pct < .5 ? '1ÈRE MI-TEMPS' : '2ÈME MI-TEMPS';

  if (flashTimer > 0) { flashTimer -= dt; return; }
  if (kickWait > 0) { kickWait -= dt; return; }

  const f = FL();

  // Move marbles
  marbles.forEach(m => {
    const dx = ball.x - m.x, dy = ball.y - m.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    const att = 0.12 + Math.random()*0.08;
    m.vx += (dx/d)*att + (Math.random()-.5)*0.5;
    m.vy += (dy/d)*att + (Math.random()-.5)*0.5;

    // cap
    const sp = Math.sqrt(m.vx*m.vx + m.vy*m.vy);
    if (sp > 4.5) { m.vx = m.vx/sp*4.5; m.vy = m.vy/sp*4.5; }

    m.x += m.vx*dt; m.y += m.vy*dt;

    // field walls
    if (m.x - m.r < f.fx) { m.x = f.fx+m.r; m.vx *= -.7; }
    if (m.x + m.r > f.fx+f.fw) { m.x = f.fx+f.fw-m.r; m.vx *= -.7; }
    if (m.y - m.r < f.fy) { m.y = f.fy+m.r; m.vy *= -.7; }
    if (m.y + m.r > f.fy+f.fh) { m.y = f.fy+f.fh-m.r; m.vy *= -.7; }

    // marble-ball collision
    const bdx = ball.x - m.x, bdy = ball.y - m.y;
    const bd = Math.sqrt(bdx*bdx + bdy*bdy);
    const minD = ball.r + m.r;
    if (bd < minD && bd > 0.01) {
      const nx = bdx/bd, ny = bdy/bd;
      const ov = minD - bd;
      ball.x += nx*ov*.6; ball.y += ny*ov*.6;
      m.x -= nx*ov*.4; m.y -= ny*ov*.4;
      const rv = (ball.vx-m.vx)*nx + (ball.vy-m.vy)*ny;
      if (rv < 0) {
        ball.vx -= rv*nx*1.3; ball.vy -= rv*ny*1.3;
        m.vx += rv*nx*.4;    m.vy += rv*ny*.4;
      }
    }
  });

  // Ball move
  ball.x += ball.vx*dt; ball.y += ball.vy*dt;
  ball.vx *= 0.991; ball.vy *= 0.991;

  // Ball top/bottom walls
  if (ball.y - ball.r < f.fy) { ball.y = f.fy+ball.r; ball.vy *= -.8; }
  if (ball.y + ball.r > f.fy+f.fh) { ball.y = f.fy+f.fh-ball.r; ball.vy *= -.8; }

  // Goal left
  if (ball.x - ball.r < f.fx) {
    if (ball.y > f.GL.y && ball.y < f.GL.y+f.GL.h) {
      score2++; document.getElementById('s2').textContent = score2;
      flashTimer = 100; flashTeam = 2; resetBall();
    } else { ball.x = f.fx+ball.r; ball.vx *= -.8; }
  }
  // Goal right
  if (ball.x + ball.r > f.fx+f.fw) {
    if (ball.y > f.GR.y && ball.y < f.GR.y+f.GR.h) {
      score1++; document.getElementById('s1').textContent = score1;
      flashTimer = 100; flashTeam = 1; resetBall();
    } else { ball.x = f.fx+f.fw-ball.r; ball.vx *= -.8; }
  }
}

// ===================== DRAW =====================
function draw() {
  const f = FL();
  const { W, H, fx, fy, fw, fh, GL, GR } = f;

  ctx.clearRect(0,0,W,H);

  // BG
  ctx.fillStyle = '#080d08';
  ctx.fillRect(0,0,W,H);

  // Grass stripes
  const stripes = 8;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i%2===0 ? '#1a5c1a' : '#1e691e';
    ctx.fillRect(fx + i*(fw/stripes), fy, fw/stripes, fh);
  }

  // Field border
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.5;
  ctx.strokeRect(fx, fy, fw, fh);

  // Center line
  ctx.beginPath();
  ctx.moveTo(fx+fw/2, fy); ctx.lineTo(fx+fw/2, fy+fh);
  ctx.stroke();

  // Center circle
  const cr = fh*0.18;
  ctx.beginPath();
  ctx.arc(fx+fw/2, fy+fh/2, cr, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(fx+fw/2, fy+fh/2, 3, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // Penalty boxes
  const pbw = fw*0.12, pbh = fh*0.44;
  ctx.strokeRect(fx, fy+(fh-pbh)/2, pbw, pbh);
  ctx.strokeRect(fx+fw-pbw, fy+(fh-pbh)/2, pbw, pbh);

  // Goals
  ctx.fillStyle='#ffffff18';
  ctx.fillRect(GL.x, GL.y, GL.w, GL.h);
  ctx.fillRect(GR.x, GR.y, GR.w, GR.h);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.strokeRect(GL.x, GL.y, GL.w, GL.h);
  ctx.strokeRect(GR.x, GR.y, GR.w, GR.h);

  // Marbles
  marbles.forEach(m => {
    const t = TEAMS[m.ti];
    // shadow
    ctx.beginPath(); ctx.arc(m.x+2, m.y+2, m.r, 0, Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
    // body
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    const g = ctx.createRadialGradient(m.x-m.r*.3, m.y-m.r*.3, m.r*.1, m.x, m.y, m.r);
    g.addColorStop(0, lighten(t.col, 55));
    g.addColorStop(1, t.col);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = t.bord; ctx.lineWidth = 1.5; ctx.stroke();
    // shine
    ctx.beginPath(); ctx.arc(m.x-m.r*.3, m.y-m.r*.3, m.r*.28, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.38)'; ctx.fill();
    // flag
    ctx.font = `${m.r}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t.flag, m.x, m.y+1);
  });

  // Ball
  ctx.beginPath(); ctx.arc(ball.x+2, ball.y+2, ball.r, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle='#f5f5f5'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1; ctx.stroke();
  // ball pattern
  [[0,-.42],[.38,.2],[-.38,.2]].forEach(([dx,dy]) => {
    ctx.beginPath();
    ctx.arc(ball.x+dx*ball.r*2, ball.y+dy*ball.r*2, ball.r*.22, 0, Math.PI*2);
    ctx.fillStyle='#222'; ctx.fill();
  });
  ctx.beginPath(); ctx.arc(ball.x-ball.r*.3, ball.y-ball.r*.3, ball.r*.28, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();

  // Goal flash
  if (flashTimer > 0) {
    const alpha = Math.min(flashTimer/50, .5);
    ctx.fillStyle = `rgba(255,220,0,${alpha})`;
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = `rgba(255,255,255,${Math.min(flashTimer/40,.95)})`;
    ctx.font = `bold ${Math.floor(W*.07)}px Arial Black`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚽ GOAL !', W/2, H/2);
  }

  // Kickoff countdown
  if (kickWait > 0 && flashTimer <= 0) {
    ctx.fillStyle='rgba(0,0,0,.45)';
    ctx.fillRect(0,0,W,H);
    const n = Math.ceil(kickWait/60);
    ctx.fillStyle='#fff';
    ctx.font = `bold ${Math.floor(W*.12)}px Arial Black`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n <= 3 ? n : '', W/2, H/2);
  }
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)+amt;
  let g = parseInt(hex.slice(3,5),16)+amt;
  let b = parseInt(hex.slice(5,7),16)+amt;
  return `rgb(${Math.min(r,255)},${Math.min(g,255)},${Math.min(b,255)})`;
}

function endGame() {
  running = false;
  cancelAnimationFrame(rafId);
  const t1 = TEAMS[sel1], t2 = TEAMS[sel2];
  let winner;
  if (score1 > score2) winner = `${t1.flag} ${t1.name} WINS !`;
  else if (score2 > score1) winner = `${t2.flag} ${t2.name} WINS !`;
  else winner = '🤝 MATCH NUL';
  document.getElementById('winnerTxt').textContent = winner;
  document.getElementById('finalScore').textContent = `${score1}  —  ${score2}`;
  document.getElementById('result').style.display = 'flex';
}
</script>
</body>
</html>
