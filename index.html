<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Football</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#060d1a;
  font-family:'Arial Black',sans-serif;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden;
}
#menu {
  display:flex; flex-direction:column;
  align-items:center; gap:14px; padding:20px;
}
#menu h1 { font-size:2.3em; color:#fff; text-shadow:0 0 30px #00ff88; letter-spacing:4px; }
.slabel { color:#00ff88; font-size:.78em; letter-spacing:3px; margin-top:4px; }
.team-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:580px; }
.tcard {
  background:#111827; border:2px solid #2a2a3e;
  border-radius:10px; padding:8px 13px;
  cursor:pointer; text-align:center; transition:all .15s;
}
.tcard:hover { border-color:#00ff88; transform:scale(1.06); }
.tcard.sel { border-color:#00ff88; background:#0d2b1a; box-shadow:0 0 14px #00ff8855; }
.tcard .fl { font-size:1.6em; }
.tcard .nm { color:#bbb; font-size:.7em; margin-top:3px; }
#startBtn {
  background:linear-gradient(135deg,#00ff88,#00cc66);
  border:none; border-radius:30px; padding:12px 46px;
  font-size:1.1em; font-weight:bold; color:#060d1a;
  cursor:pointer; letter-spacing:2px; margin-top:6px; transition:all .2s;
}
#startBtn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 0 28px #00ff8866; }
#startBtn:disabled { opacity:.3; cursor:not-allowed; }
#gw { display:none; flex-direction:column; align-items:center; }
#sb {
  display:flex; align-items:center; gap:20px;
  padding:8px 28px; background:#111827;
  border-radius:0 0 14px 14px; margin-bottom:6px;
}
.sct { display:flex; align-items:center; gap:8px; }
.scf { font-size:1.7em; }
.scn { font-size:2em; font-weight:bold; min-width:26px; text-align:center; }
#s1{color:#4af;} #s2{color:#fa4;}
#tmr { color:#aaa; font-size:1em; text-align:center; }
#ph { color:#00ff88; font-size:.68em; letter-spacing:2px; }
canvas { border-radius:12px; box-shadow:0 0 50px #00000099; display:block; }
#res {
  display:none; position:fixed; inset:0; background:#000b;
  flex-direction:column; align-items:center; justify-content:center;
  gap:18px; z-index:999;
}
#res h2 { font-size:2.5em; color:#00ff88; text-shadow:0 0 40px #00ff88; text-transform:uppercase; text-align:center; }
#fsc { font-size:2em; color:#fff; letter-spacing:8px; }
#rpBtn {
  background:#00ff88; border:none; border-radius:30px;
  padding:11px 38px; font-size:1.05em; font-weight:bold;
  color:#060d1a; cursor:pointer; margin-top:6px;
}
</style>
</head>
<body>

<div id="menu">
  <h1>⚽ MARBLE FOOTBALL</h1>
  <div class="slabel">ÉQUIPE 1</div>
  <div class="team-grid" id="g1"></div>
  <div class="slabel">ÉQUIPE 2</div>
  <div class="team-grid" id="g2"></div>
  <button id="startBtn" disabled onclick="startGame()">KICK OFF ▶</button>
</div>

<div id="gw">
  <div id="sb">
    <div class="sct"><span class="scf" id="f1">🇫🇷</span><span class="scn" id="s1">0</span></div>
    <div><div id="tmr">00:00</div><div id="ph">1ÈRE MI-TEMPS</div></div>
    <div class="sct"><span class="scn" id="s2">0</span><span class="scf" id="f2">🇧🇷</span></div>
  </div>
  <canvas id="c"></canvas>
</div>

<div id="res">
  <h2 id="wtxt"></h2>
  <div id="fsc"></div>
  <button id="rpBtn" onclick="goMenu()">🔄 REJOUER</button>
</div>

<script>
const TEAMS = [
  { name:"France",     flag:"🇫🇷", col:"#1a6bdb", bord:"#ffffff" },
  { name:"Brésil",    flag:"🇧🇷", col:"#22c45e", bord:"#f5d020" },
  { name:"Espagne",   flag:"🇪🇸", col:"#c8102e", bord:"#f9b200" },
  { name:"Allemagne", flag:"🇩🇪", col:"#444",    bord:"#f9b200" },
  { name:"Portugal",  flag:"🇵🇹", col:"#006600", bord:"#d62828" },
  { name:"Argentine", flag:"🇦🇷", col:"#74c0fc", bord:"#ffffff" },
  { name:"Maroc",     flag:"🇲🇦", col:"#c1121f", bord:"#006233" },
  { name:"Turquie",   flag:"🇹🇷", col:"#e63946", bord:"#ffffff" },
  { name:"Angleterre",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", col:"#aaaaaa", bord:"#cf142b" },
  { name:"Italie",    flag:"🇮🇹", col:"#003399", bord:"#009246" },
];

// Roles: GK=gardien stays in goal. DEF/MID/ATT have home positions.
// hx: 0=left goalline, 1=right goalline
// For side 'R' we mirror hx
function makeRoles(side) {
  const L = side === 'L';
  // base positions when attacking left→right (L side)
  const raw = [
    { type:'GK',  hx:0.04, hy:0.50 },
    { type:'DEF', hx:0.18, hy:0.20 },
    { type:'DEF', hx:0.18, hy:0.40 },
    { type:'DEF', hx:0.18, hy:0.60 },
    { type:'DEF', hx:0.18, hy:0.80 },
    { type:'MID', hx:0.42, hy:0.22 },
    { type:'MID', hx:0.42, hy:0.50 },
    { type:'MID', hx:0.42, hy:0.78 },
    { type:'ATT', hx:0.70, hy:0.25 },
    { type:'ATT', hx:0.70, hy:0.50 },
    { type:'ATT', hx:0.70, hy:0.75 },
  ];
  return raw.map(r => ({ ...r, hx: L ? r.hx : 1 - r.hx }));
}

let sel1=null, sel2=null;
function buildGrids(){
  ['g1','g2'].forEach((id,gi)=>{
    const el=document.getElementById(id); el.innerHTML='';
    TEAMS.forEach((t,i)=>{
      const d=document.createElement('div'); d.className='tcard';
      d.innerHTML=`<div class="fl">${t.flag}</div><div class="nm">${t.name}</div>`;
      d.onclick=()=>{
        el.querySelectorAll('.tcard').forEach(c=>c.classList.remove('sel'));
        d.classList.add('sel');
        gi===0?sel1=i:sel2=i;
        document.getElementById('startBtn').disabled=(sel1===null||sel2===null||sel1===sel2);
      };
      el.appendChild(d);
    });
  });
}
buildGrids();

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function setSize(){
  const maxW=Math.min(window.innerWidth-16,860);
  let W=maxW, H=W*(500/860);
  const maxH=window.innerHeight-120;
  if(H>maxH){H=maxH;W=H*(860/500);}
  canvas.width=Math.floor(W); canvas.height=Math.floor(H);
}
setSize();

// Field geometry helper
function G(){
  const W=canvas.width, H=canvas.height;
  const px=W*0.07, py=H*0.1;
  const fw=W-px*2, fh=H-py*2;
  const gh=fh*0.30, gy=py+(fh-gh)/2, gw=W*0.026;
  return { W,H, px,py, fw,fh,
    cx:px+fw/2, cy:py+fh/2,
    GL:{x:px-gw,y:gy,w:gw,h:gh},
    GR:{x:px+fw, y:gy,w:gw,h:gh} };
}

const MR = ()=>Math.max(10, Math.floor(canvas.width*0.013));
const BR = ()=>Math.max(11, Math.floor(canvas.width*0.018));
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndS=()=>Math.random()>.5?1:-1;
const dist=(ax,ay,bx,by)=>Math.sqrt((ax-bx)**2+(ay-by)**2)||0.001;

let marbles=[], ball={};
let sc1=0, sc2=0, gTime=0, totalF=0;
let running=false, rafId=null, lastTs=0;
let flashT=0, kickWait=0;

function homeXY(role, g){
  return { hx: g.px + role.hx*g.fw, hy: g.py + role.hy*g.fh };
}

function spawnMarbles(){
  const g=G(); marbles=[];
  const mr=MR();
  [makeRoles('L'), makeRoles('R')].forEach((roles,gi)=>{
    const ti = gi===0?sel1:sel2;
    roles.forEach(role=>{
      const {hx,hy} = homeXY(role,g);
      marbles.push({
        x: hx+rnd(-6,6), y: hy+rnd(-6,6),
        vx:0, vy:0,
        ti, role,
        side: gi===0?'L':'R',
        r: mr,
        // wander state
        wx: hx, wy: hy,
        wt: rnd(80,200),
        wvx: rnd(-0.3,0.3), wvy: rnd(-0.3,0.3),
      });
    });
  });
}

function resetBall(){
  const g=G();
  ball={x:g.cx, y:g.cy, vx:rnd(.8,1.8)*rndS(), vy:rnd(.5,1.2)*rndS(), r:BR()};
  kickWait=90;
}

function startGame(){
  if(sel1===null||sel2===null||sel1===sel2) return;
  setSize(); sc1=0;sc2=0;gTime=0; totalF=90*60; running=true; flashT=0;
  document.getElementById('s1').textContent=0;
  document.getElementById('s2').textContent=0;
  document.getElementById('f1').textContent=TEAMS[sel1].flag;
  document.getElementById('f2').textContent=TEAMS[sel2].flag;
  spawnMarbles(); resetBall();
  document.getElementById('menu').style.display='none';
  document.getElementById('gw').style.display='flex';
  if(rafId) cancelAnimationFrame(rafId);
  lastTs=0; rafId=requestAnimationFrame(loop);
}

function goMenu(){
  running=false; if(rafId) cancelAnimationFrame(rafId);
  sel1=null;sel2=null; buildGrids();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('res').style.display='none';
  document.getElementById('gw').style.display='none';
  document.getElementById('menu').style.display='flex';
}

function loop(ts){
  if(!running) return;
  const dt=lastTs===0?1:Math.min((ts-lastTs)/16.67,3);
  lastTs=ts; gTime+=dt;
  if(gTime>=totalF){endGame();return;}
  update(dt); draw();
  rafId=requestAnimationFrame(loop);
}

function update(dt){
  // HUD
  const pct=gTime/totalF;
  const mins=Math.floor(pct*90), secs=Math.floor((pct*90-mins)*60);
  document.getElementById('tmr').textContent=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  document.getElementById('ph').textContent=pct<.5?'1ÈRE MI-TEMPS':'2ÈME MI-TEMPS';

  if(flashT>0){flashT-=dt;return;}
  if(kickWait>0){kickWait-=dt;return;}

  const g=G();

  // ── Sort marbles by distance to ball, find closest 2 per team ──
  const teams = {L:[], R:[]};
  marbles.forEach((m,i)=>{
    m._db = dist(m.x,m.y,ball.x,ball.y);
    teams[m.side].push(i);
  });
  // Sort by dist
  teams.L.sort((a,b)=>marbles[a]._db-marbles[b]._db);
  teams.R.sort((a,b)=>marbles[a]._db-marbles[b]._db);
  // Mark chasers: closest 2 non-GK per team chase, rest stay home
  marbles.forEach(m=>m._chase=false);
  ['L','R'].forEach(side=>{
    let count=0;
    teams[side].forEach(i=>{
      const m=marbles[i];
      if(m.role.type==='GK') return; // GK never chases
      if(count<2){ m._chase=true; count++; }
    });
  });

  marbles.forEach((m,idx)=>{
    const {hx,hy} = homeXY(m.role,g);
    const toBallX=ball.x-m.x, toBallY=ball.y-m.y;
    const db=m._db;
    const toHomeX=hx-m.x, toHomeY=hy-m.y;
    const dh=dist(m.x,m.y,hx,hy);

    let tx=0, ty=0; // target velocity direction

    if(m.role.type==='GK'){
      // GK: lock X to goal line, track ball Y within post range
      const gl = m.side==='L'? g.GL : g.GR;
      const gkX = gl.x + (m.side==='L'? gl.w+m.r : -m.r);
      const clampedY = Math.max(gl.y+m.r+2, Math.min(gl.y+gl.h-m.r-2, ball.y));
      tx = (gkX-m.x)*0.18;
      ty = (clampedY-m.y)*0.18;
      // if ball very close, spring toward it
      if(db < g.fw*0.15){ tx+=(toBallX/db)*1.5; ty+=(toBallY/db)*1.5; }
    } else if(m._chase){
      // Chase ball directly
      const spd = m.role.type==='ATT'?4.0:m.role.type==='MID'?3.2:2.6;
      tx = (toBallX/db)*spd;
      ty = (toBallY/db)*spd;
    } else {
      // Go home, then wander softly around home
      if(dh > 25){
        // Still far from home: rush home
        tx = (toHomeX/dh)*3.5;
        ty = (toHomeY/dh)*3.5;
      } else {
        // At home: gentle wander in a small radius (20px) around home
        m.wt-=dt;
        if(m.wt<=0){
          const angle=Math.random()*Math.PI*2;
          const rad=rnd(0,20);
          m.wx=hx+Math.cos(angle)*rad;
          m.wy=hy+Math.sin(angle)*rad;
          // clamp to field
          m.wx=Math.max(g.px+m.r,Math.min(g.px+g.fw-m.r,m.wx));
          m.wy=Math.max(g.py+m.r,Math.min(g.py+g.fh-m.r,m.wy));
          m.wt=rnd(80,220);
        }
        const dw=dist(m.x,m.y,m.wx,m.wy)||1;
        tx=(m.wx-m.x)/dw*0.8;
        ty=(m.wy-m.y)/dw*0.8;
      }
    }

    // Strong repulsion from other marbles
    marbles.forEach((o,j)=>{
      if(j===idx) return;
      const dx=m.x-o.x, dy=m.y-o.y;
      const dd=Math.sqrt(dx*dx+dy*dy)||0.01;
      const minSep=(m.r+o.r)*2.0;
      if(dd<minSep){
        const f=(minSep-dd)/minSep;
        tx+=(dx/dd)*f*6.0;
        ty+=(dy/dd)*f*6.0;
      }
    });

    // Apply force → velocity (high damping so they don't drift forever)
    const damp = (m._chase||m.role.type==='GK') ? 0.75 : 0.70;
    m.vx=(m.vx+tx*dt)*damp;
    m.vy=(m.vy+ty*dt)*damp;

    // Speed cap
    const maxV = m.role.type==='GK'?3.5:m._chase?5.0:3.0;
    const sv=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    if(sv>maxV){m.vx=m.vx/sv*maxV;m.vy=m.vy/sv*maxV;}

    m.x+=m.vx*dt; m.y+=m.vy*dt;

    // Field clamp
    if(m.x-m.r<g.px){m.x=g.px+m.r;m.vx=Math.abs(m.vx)*0.5;}
    if(m.x+m.r>g.px+g.fw){m.x=g.px+g.fw-m.r;m.vx=-Math.abs(m.vx)*0.5;}
    if(m.y-m.r<g.py){m.y=g.py+m.r;m.vy=Math.abs(m.vy)*0.5;}
    if(m.y+m.r>g.py+g.fh){m.y=g.py+g.fh-m.r;m.vy=-Math.abs(m.vy)*0.5;}

    // Hit ball
    if(db<ball.r+m.r && db>0.01){
      const nx=toBallX/db, ny=toBallY/db;
      const ov=(ball.r+m.r)-db;
      ball.x+=nx*ov*0.7; ball.y+=ny*ov*0.7;
      m.x-=nx*ov*0.3; m.y-=ny*ov*0.3;
      const rv=(ball.vx-m.vx)*nx+(ball.vy-m.vy)*ny;
      if(rv<0){
        const imp=rv*1.5;
        ball.vx-=imp*nx; ball.vy-=imp*ny;
        m.vx+=imp*nx*0.2; m.vy+=imp*ny*0.2;
      }
    }
  });

  // Ball physics
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  ball.vx*=0.990; ball.vy*=0.990;

  if(ball.y-ball.r<g.py){ball.y=g.py+ball.r;ball.vy=Math.abs(ball.vy)*0.82;}
  if(ball.y+ball.r>g.py+g.fh){ball.y=g.py+g.fh-ball.r;ball.vy=-Math.abs(ball.vy)*0.82;}

  // Goals
  if(ball.x-ball.r<g.px){
    if(ball.y>g.GL.y&&ball.y<g.GL.y+g.GL.h){sc2++;document.getElementById('s2').textContent=sc2;flashT=110;resetBall();}
    else{ball.x=g.px+ball.r;ball.vx=Math.abs(ball.vx)*0.82;}
  }
  if(ball.x+ball.r>g.px+g.fw){
    if(ball.y>g.GR.y&&ball.y<g.GR.y+g.GR.h){sc1++;document.getElementById('s1').textContent=sc1;flashT=110;resetBall();}
    else{ball.x=g.px+g.fw-ball.r;ball.vx=-Math.abs(ball.vx)*0.82;}
  }
}

// ── DRAW ──────────────────────────────────────────────
function draw(){
  const g=G();
  const{W,H,px,py,fw,fh,GL,GR}=g;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#060d1a'; ctx.fillRect(0,0,W,H);

  // Grass stripes
  for(let i=0;i<10;i++){
    ctx.fillStyle=i%2===0?'#1b5e1b':'#1e6a1e';
    ctx.fillRect(px+i*(fw/10),py,fw/10,fh);
  }
  // Field lines
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(px,py,fw,fh);
  ctx.beginPath(); ctx.moveTo(px+fw/2,py); ctx.lineTo(px+fw/2,py+fh); ctx.stroke();
  ctx.beginPath(); ctx.arc(px+fw/2,py+fh/2,fh*0.17,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px+fw/2,py+fh/2,3,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  // Penalty boxes
  const pb_w=fw*0.13,pb_h=fh*0.46;
  ctx.strokeRect(px,py+(fh-pb_h)/2,pb_w,pb_h);
  ctx.strokeRect(px+fw-pb_w,py+(fh-pb_h)/2,pb_w,pb_h);
  const sb_w=fw*0.06,sb_h=fh*0.26;
  ctx.strokeRect(px,py+(fh-sb_h)/2,sb_w,sb_h);
  ctx.strokeRect(px+fw-sb_w,py+(fh-sb_h)/2,sb_w,sb_h);
  // Goals
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(GL.x,GL.y,GL.w,GL.h); ctx.fillRect(GR.x,GR.y,GR.w,GR.h);
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2;
  ctx.strokeRect(GL.x,GL.y,GL.w,GL.h); ctx.strokeRect(GR.x,GR.y,GR.w,GR.h);

  marbles.forEach(drawMarble);
  drawBall();

  if(flashT>0){
    ctx.fillStyle=`rgba(255,215,0,${Math.min(flashT/60,.45)})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.font=`bold ${Math.floor(W*0.08)}px Arial Black`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(255,255,255,${Math.min(flashT/40,.95)})`;
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=30;
    ctx.fillText('⚽  GOAL !',W/2,H/2);
    ctx.restore();
  }

  if(kickWait>0&&flashT<=0){
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fillRect(0,0,W,H);
    const n=Math.ceil(kickWait/38);
    if(n>=1&&n<=3){
      ctx.font=`bold ${Math.floor(W*0.13)}px Arial Black`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.fillText(n,W/2,H/2);
    }
  }
}

function drawMarble(m){
  const t=TEAMS[m.ti];
  // shadow
  ctx.beginPath(); ctx.arc(m.x+2,m.y+3,m.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fill();
  // gradient body
  const gr=ctx.createRadialGradient(m.x-m.r*.35,m.y-m.r*.38,m.r*.05,m.x,m.y,m.r);
  gr.addColorStop(0,lighten(t.col,70)); gr.addColorStop(1,t.col);
  ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
  ctx.fillStyle=gr; ctx.fill();
  ctx.strokeStyle=t.bord; ctx.lineWidth=1.5; ctx.stroke();
  // GK: gold ring
  if(m.role.type==='GK'){
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r+3,0,Math.PI*2);
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.2; ctx.stroke();
  }
  // shine
  ctx.beginPath(); ctx.arc(m.x-m.r*.3,m.y-m.r*.32,m.r*.26,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.38)'; ctx.fill();
  // flag emoji
  ctx.font=`${m.r}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t.flag,m.x,m.y+1);
}

function drawBall(){
  const b=ball;
  ctx.beginPath(); ctx.arc(b.x+2,b.y+3,b.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fill();
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle='#f0f0f0'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1; ctx.stroke();
  [[0,-.44],[.38,.2],[-.38,.2]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(b.x+dx*b.r*2,b.y+dy*b.r*2,b.r*.22,0,Math.PI*2);
    ctx.fillStyle='#1a1a1a'; ctx.fill();
  });
  ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.27,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fill();
}

function lighten(hex,amt){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return `rgb(${r},${g},${b})`;
}

function endGame(){
  running=false; cancelAnimationFrame(rafId);
  const t1=TEAMS[sel1],t2=TEAMS[sel2];
  document.getElementById('wtxt').textContent=
    sc1>sc2?`${t1.flag} ${t1.name} WINS !`:sc2>sc1?`${t2.flag} ${t2.name} WINS !`:'🤝 MATCH NUL';
  document.getElementById('fsc').textContent=`${sc1}  —  ${sc2}`;
  document.getElementById('res').style.display='flex';
}
