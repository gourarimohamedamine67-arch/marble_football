<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Football</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    font-family: 'Arial Black', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 10;
  }

  #menu h1 {
    font-size: 3em;
    color: #fff;
    text-shadow: 0 0 30px #00ff88;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  #menu p {
    color: #aaa;
    font-size: 1em;
    text-align: center;
  }

  .team-select {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .team-card {
    background: #1a1a2e;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 16px 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-width: 100px;
  }

  .team-card:hover, .team-card.selected {
    border-color: #00ff88;
    box-shadow: 0 0 20px #00ff8844;
    transform: scale(1.05);
  }

  .team-card .flag { font-size: 2em; }
  .team-card .name { color: #fff; font-size: 0.85em; margin-top: 6px; }

  .vs-label { color: #555; font-size: 0.9em; margin-top: 8px; text-align: center; }

  #startBtn {
    background: linear-gradient(135deg, #00ff88, #00cc66);
    border: none;
    border-radius: 30px;
    padding: 14px 48px;
    font-size: 1.3em;
    font-weight: bold;
    color: #0a0a1a;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    margin-top: 10px;
  }

  #startBtn:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ff8866; }
  #startBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* GAME */
  #gameWrapper {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #scoreboard {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 30px;
    background: #1a1a2e;
    border-radius: 0 0 16px 16px;
    margin-bottom: 8px;
    box-shadow: 0 4px 20px #00000066;
  }

  .score-team {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.2em;
    color: #fff;
  }

  .score-flag { font-size: 1.8em; }
  .score-num {
    font-size: 2em;
    font-weight: bold;
    min-width: 30px;
    text-align: center;
  }

  #team1score { color: #4af; }
  #team2score { color: #fa4; }

  #timer {
    font-size: 1.1em;
    color: #aaa;
    min-width: 60px;
    text-align: center;
  }

  #phase {
    font-size: 0.75em;
    color: #00ff88;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }

  canvas {
    border-radius: 12px;
    box-shadow: 0 0 40px #00000088;
    max-width: 100vw;
  }

  #result {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 20px;
  }

  #result h2 {
    font-size: 3em;
    color: #00ff88;
    text-shadow: 0 0 40px #00ff88;
    text-transform: uppercase;
  }

  #result .final-score {
    font-size: 2em;
    color: #fff;
    letter-spacing: 6px;
  }

  #playAgain {
    background: #00ff88;
    border: none;
    border-radius: 30px;
    padding: 12px 40px;
    font-size: 1.1em;
    font-weight: bold;
    color: #0a0a1a;
    cursor: pointer;
    margin-top: 10px;
  }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>⚽ Marble Football</h1>
  <p>Choisis tes deux équipes</p>

  <div class="vs-label">ÉQUIPE 1</div>
  <div class="team-select" id="team1Select"></div>

  <div class="vs-label">ÉQUIPE 2</div>
  <div class="team-select" id="team2Select"></div>

  <button id="startBtn" disabled>KICK OFF ▶</button>
</div>

<!-- GAME -->
<div id="gameWrapper">
  <div id="scoreboard">
    <div class="score-team">
      <span class="score-flag" id="flag1">🇫🇷</span>
      <span class="score-num" id="team1score">0</span>
    </div>
    <div>
      <div id="timer">90:00</div>
      <div id="phase">1st Half</div>
    </div>
    <div class="score-team">
      <span class="score-num" id="team2score">0</span>
      <span class="score-flag" id="flag2">🇧🇷</span>
    </div>
  </div>
  <canvas id="canvas"></canvas>
</div>

<!-- RESULT -->
<div id="result">
  <h2 id="winnerText">Winner!</h2>
  <div class="final-score" id="finalScore">0 - 0</div>
  <button id="playAgain">REJOUER</button>
</div>

<script>
const TEAMS = [
  { name: "France",    flag: "🇫🇷", color: "#1a6bdb", border: "#fff" },
  { name: "Brésil",   flag: "🇧🇷", color: "#22c45e", border: "#f5d020" },
  { name: "Espagne",  flag: "🇪🇸", color: "#d62828", border: "#f9b200" },
  { name: "Allemagne",flag: "🇩🇪", color: "#333",    border: "#f9b200" },
  { name: "Portugal", flag: "🇵🇹", color: "#006600", border: "#d62828" },
  { name: "Argentine",flag: "🇦🇷", color: "#74c0fc", border: "#fff" },
  { name: "Maroc",    flag: "🇲🇦", color: "#c1121f", border: "#006233" },
  { name: "Turquie",  flag: "🇹🇷", color: "#e63946", border: "#fff" },
];

let t1idx = null, t2idx = null;

// Build team cards
function buildCards(containerId, onSelect) {
  const el = document.getElementById(containerId);
  TEAMS.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `<div class="flag">${t.flag}</div><div class="name">${t.name}</div>`;
    card.onclick = () => {
      el.querySelectorAll('.team-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      onSelect(i);
      checkReady();
    };
    el.appendChild(card);
  });
}

function checkReady() {
  const btn = document.getElementById('startBtn');
  btn.disabled = (t1idx === null || t2idx === null || t1idx === t2idx);
}

buildCards('team1Select', i => { t1idx = i; });
buildCards('team2Select', i => { t2idx = i; });

document.getElementById('startBtn').onclick = startGame;
document.getElementById('playAgain').onclick = () => {
  document.getElementById('result').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('gameWrapper').style.display = 'none';
};

// ===================== GAME ENGINE =====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = 800, H = 480;
canvas.width = W;
canvas.height = H;

const FIELD = { x: 60, y: 40, w: W - 120, h: H - 80 };
const GOAL_W = 12, GOAL_H = 100;
const BALL_R = 12;
const MARBLE_R = 11;
const GOAL_L = { x: FIELD.x - GOAL_W, y: FIELD.y + FIELD.h/2 - GOAL_H/2, w: GOAL_W, h: GOAL_H };
const GOAL_R = { x: FIELD.x + FIELD.w, y: FIELD.y + FIELD.h/2 - GOAL_H/2, w: GOAL_W, h: GOAL_H };

let ball, team1, team2, score1, score2, gameTime, totalTime, running, animId;
let goalFlash = 0, goalTeam = 0;
let kickoffCountdown = 0;

function rnd(a, b) { return a + Math.random() * (b - a); }
function rndSign() { return Math.random() > 0.5 ? 1 : -1; }

function makeMarble(x, y, team) {
  return {
    x, y,
    vx: rnd(0.5, 2) * rndSign(),
    vy: rnd(0.5, 2) * rndSign(),
    team,
    r: MARBLE_R,
    targetX: x,
    targetY: y,
  };
}

function initMarbles(t1, t2) {
  const mx = FIELD.x, my = FIELD.y, mw = FIELD.w, mh = FIELD.h;
  const cx = mx + mw/2;
  // Team 1 left side, team 2 right side
  const arr1 = [], arr2 = [];
  for (let i = 0; i < 11; i++) {
    arr1.push(makeMarble(rnd(mx+20, cx-20), rnd(my+20, my+mh-20), t1));
    arr2.push(makeMarble(rnd(cx+20, mx+mw-20), rnd(my+20, my+mh-20), t2));
  }
  return [arr1, arr2];
}

function startGame() {
  const t1 = TEAMS[t1idx], t2 = TEAMS[t2idx];
  score1 = 0; score2 = 0;
  gameTime = 0;
  totalTime = 90 * 60; // 90 real seconds = 90 min
  running = true;
  goalFlash = 0;
  kickoffCountdown = 180; // 3 sec pause at start

  [team1, team2] = initMarbles(t1, t2);

  ball = {
    x: FIELD.x + FIELD.w/2,
    y: FIELD.y + FIELD.h/2,
    vx: rnd(1, 2) * rndSign(),
    vy: rnd(1, 2) * rndSign(),
    r: BALL_R,
  };

  document.getElementById('flag1').textContent = t1.flag;
  document.getElementById('flag2').textContent = t2.flag;
  document.getElementById('team1score').textContent = 0;
  document.getElementById('team2score').textContent = 0;
  document.getElementById('phase').textContent = '1ère Mi-Temps';

  document.getElementById('menu').style.display = 'none';
  document.getElementById('gameWrapper').style.display = 'flex';

  if (animId) cancelAnimationFrame(animId);
  loop();
}

function resetKickoff() {
  ball.x = FIELD.x + FIELD.w/2;
  ball.y = FIELD.y + FIELD.h/2;
  ball.vx = rnd(1, 2) * rndSign();
  ball.vy = rnd(1, 2) * rndSign();
  kickoffCountdown = 120;
}

let lastTime = 0;
function loop(ts = 0) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  if (!running) return;

  update(dt);
  draw();

  animId = requestAnimationFrame(loop);
}

function update(dt) {
  gameTime += dt;
  if (gameTime >= totalTime) {
    endGame();
    return;
  }

  // Update phase label
  const halfTime = totalTime / 2;
  document.getElementById('phase').textContent = gameTime < halfTime ? '1ère Mi-Temps' : '2ème Mi-Temps';

  // Timer display (0 to 90 min)
  const mins = Math.floor((gameTime / totalTime) * 90);
  const secs = Math.floor(((gameTime / totalTime) * 90 - mins) * 60);
  document.getElementById('timer').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;

  if (goalFlash > 0) { goalFlash -= dt; return; }
  if (kickoffCountdown > 0) { kickoffCountdown -= dt; return; }

  // Update marbles — chase ball with random noise
  [...team1, ...team2].forEach(m => {
    const dx = ball.x - m.x;
    const dy = ball.y - m.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const speed = 1.2 + Math.random() * 0.6;
    m.vx += (dx/dist) * 0.15 * speed * (Math.random() > 0.3 ? 1 : -1);
    m.vy += (dy/dist) * 0.15 * speed * (Math.random() > 0.3 ? 1 : -1);

    // Random wander
    m.vx += (Math.random() - 0.5) * 0.4;
    m.vy += (Math.random() - 0.5) * 0.4;

    // Cap speed
    const spd = Math.sqrt(m.vx*m.vx + m.vy*m.vy);
    if (spd > 4) { m.vx = m.vx/spd*4; m.vy = m.vy/spd*4; }

    m.x += m.vx * dt;
    m.y += m.vy * dt;

    // Bounce off field walls
    if (m.x - m.r < FIELD.x) { m.x = FIELD.x + m.r; m.vx *= -0.7; }
    if (m.x + m.r > FIELD.x + FIELD.w) { m.x = FIELD.x + FIELD.w - m.r; m.vx *= -0.7; }
    if (m.y - m.r < FIELD.y) { m.y = FIELD.y + m.r; m.vy *= -0.7; }
    if (m.y + m.r > FIELD.y + FIELD.h) { m.y = FIELD.y + FIELD.h - m.r; m.vy *= -0.7; }

    // Marble-ball collision
    const bdx = ball.x - m.x, bdy = ball.y - m.y;
    const bdist = Math.sqrt(bdx*bdx + bdy*bdy);
    const minD = ball.r + m.r;
    if (bdist < minD && bdist > 0.01) {
      const nx = bdx/bdist, ny = bdy/bdist;
      const overlap = minD - bdist;
      ball.x += nx * overlap * 0.5;
      ball.y += ny * overlap * 0.5;
      m.x -= nx * overlap * 0.5;
      m.y -= ny * overlap * 0.5;
      const relVx = ball.vx - m.vx;
      const relVy = ball.vy - m.vy;
      const dot = relVx*nx + relVy*ny;
      if (dot < 0) {
        ball.vx -= dot * nx * 1.2;
        ball.vy -= dot * ny * 1.2;
        m.vx += dot * nx * 0.4;
        m.vy += dot * ny * 0.4;
      }
    }
  });

  // Ball physics
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;
  ball.vx *= 0.992;
  ball.vy *= 0.992;

  // Ball bounce off field walls (not goal sides)
  if (ball.y - ball.r < FIELD.y) { ball.y = FIELD.y + ball.r; ball.vy *= -0.85; }
  if (ball.y + ball.r > FIELD.y + FIELD.h) { ball.y = FIELD.y + FIELD.h - ball.r; ball.vy *= -0.85; }

  // Left wall / goal
  if (ball.x - ball.r < FIELD.x) {
    const inGoal = ball.y > GOAL_L.y && ball.y < GOAL_L.y + GOAL_L.h;
    if (inGoal) {
      score2++;
      document.getElementById('team2score').textContent = score2;
      goalFlash = 120; goalTeam = 2;
      resetKickoff();
    } else {
      ball.x = FIELD.x + ball.r; ball.vx *= -0.85;
    }
  }

  // Right wall / goal
  if (ball.x + ball.r > FIELD.x + FIELD.w) {
    const inGoal = ball.y > GOAL_R.y && ball.y < GOAL_R.y + GOAL_R.h;
    if (inGoal) {
      score1++;
      document.getElementById('team1score').textContent = score1;
      goalFlash = 120; goalTeam = 1;
      resetKickoff();
    } else {
      ball.x = FIELD.x + FIELD.w - ball.r; ball.vx *= -0.85;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0d2b0d';
  ctx.fillRect(0, 0, W, H);

  // Field grass stripes
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#1a5c1a' : '#1e6b1e';
    ctx.fillRect(FIELD.x + i * FIELD.w/8, FIELD.y, FIELD.w/8, FIELD.h);
  }

  // Field border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.strokeRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h);

  // Center line & circle
  ctx.beginPath();
  ctx.moveTo(FIELD.x + FIELD.w/2, FIELD.y);
  ctx.lineTo(FIELD.x + FIELD.w/2, FIELD.y + FIELD.h);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(FIELD.x + FIELD.w/2, FIELD.y + FIELD.h/2, 50, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(FIELD.x + FIELD.w/2, FIELD.y + FIELD.h/2, 3, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Penalty areas
  const pa_w = 80, pa_h = 160;
  ctx.strokeRect(FIELD.x, FIELD.y + FIELD.h/2 - pa_h/2, pa_w, pa_h);
  ctx.strokeRect(FIELD.x + FIELD.w - pa_w, FIELD.y + FIELD.h/2 - pa_h/2, pa_w, pa_h);

  // Goals
  ctx.fillStyle = '#ffffff22';
  ctx.fillRect(GOAL_L.x, GOAL_L.y, GOAL_L.w, GOAL_L.h);
  ctx.fillRect(GOAL_R.x, GOAL_R.y, GOAL_R.w, GOAL_R.h);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(GOAL_L.x, GOAL_L.y, GOAL_L.w, GOAL_L.h);
  ctx.strokeRect(GOAL_R.x, GOAL_R.y, GOAL_R.w, GOAL_R.h);

  // Goal flash
  if (goalFlash > 0) {
    ctx.fillStyle = `rgba(255,220,0,${Math.min(goalFlash/60, 0.35)})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = `rgba(255,255,255,${Math.min(goalFlash/60, 0.9)})`;
    ctx.font = 'bold 60px Arial Black';
    ctx.textAlign = 'center';
    ctx.fillText('⚽ GOAL !', W/2, H/2);
  }

  if (kickoffCountdown > 0 && goalFlash <= 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0,0,W,H);
    const num = Math.ceil(kickoffCountdown / 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 80px Arial Black';
    ctx.textAlign = 'center';
    ctx.fillText(num, W/2, H/2 + 20);
  }

  // Draw marbles
  const allMarbles = [...team1, ...team2];
  allMarbles.forEach(m => drawMarble(m));

  // Draw ball
  drawBall(ball);
}

function drawMarble(m) {
  const t = m.team;
  // Shadow
  ctx.beginPath();
  ctx.arc(m.x + 2, m.y + 2, m.r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Main fill
  ctx.beginPath();
  ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
  const g = ctx.createRadialGradient(m.x - m.r*0.3, m.y - m.r*0.3, m.r*0.1, m.x, m.y, m.r);
  g.addColorStop(0, lighten(t.color, 60));
  g.addColorStop(1, t.color);
  ctx.fillStyle = g;
  ctx.fill();

  // Border
  ctx.strokeStyle = t.border;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Shine
  ctx.beginPath();
  ctx.arc(m.x - m.r*0.3, m.y - m.r*0.3, m.r*0.25, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Flag emoji tiny
  ctx.font = `${m.r}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t.flag, m.x, m.y);
}

function drawBall(b) {
  // Shadow
  ctx.beginPath();
  ctx.arc(b.x + 3, b.y + 3, b.r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Ball
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pentagon pattern
  ctx.fillStyle = '#111';
  drawSoccerPattern(b.x, b.y, b.r);

  // Shine
  ctx.beginPath();
  ctx.arc(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
}

function drawSoccerPattern(cx, cy, r) {
  // Simple hexagon dots
  const pts = [[0,-r*0.45],[r*0.4,r*0.2],[-r*0.4,r*0.2]];
  pts.forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.arc(cx+dx, cy+dy, r*0.22, 0, Math.PI*2);
    ctx.fillStyle = '#222';
    ctx.fill();
  });
}

function lighten(hex, amt) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return `rgb(${r},${g},${b})`;
}

function endGame() {
  running = false;
  cancelAnimationFrame(animId);

  const t1 = TEAMS[t1idx], t2 = TEAMS[t2idx];
  const result = document.getElementById('result');
  result.style.display = 'flex';

  let winner;
  if (score1 > score2) winner = `${t1.flag} ${t1.name} WINS !`;
  else if (score2 > score1) winner = `${t2.flag} ${t2.name} WINS !`;
  else winner = `MATCH NUL 🤝`;

  document.getElementById('winnerText').textContent = winner;
  document.getElementById('finalScore').textContent = `${score1} — ${score2}`;
}
</script>
</body>
</html>
