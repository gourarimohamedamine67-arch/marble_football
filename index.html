<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Football</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#060d1a;
  font-family:'Arial Black',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
#menu {
  display:flex; flex-direction:column;
  align-items:center; gap:16px; padding:20px;
}
#menu h1 {
  font-size:2.4em; color:#fff;
  text-shadow:0 0 30px #00ff88; letter-spacing:4px;
}
.slabel { color:#00ff88; font-size:.8em; letter-spacing:3px; margin-top:4px; }
.team-grid {
  display:flex; flex-wrap:wrap; gap:8px;
  justify-content:center; max-width:580px;
}
.tcard {
  background:#111827; border:2px solid #2a2a3e;
  border-radius:10px; padding:8px 14px;
  cursor:pointer; text-align:center; transition:all .18s;
}
.tcard:hover { border-color:#00ff88; transform:scale(1.06); }
.tcard.sel { border-color:#00ff88; background:#0d2b1a; box-shadow:0 0 14px #00ff8855; }
.tcard .fl { font-size:1.7em; }
.tcard .nm { color:#bbb; font-size:.72em; margin-top:3px; }
#startBtn {
  background:linear-gradient(135deg,#00ff88,#00cc66);
  border:none; border-radius:30px; padding:13px 48px;
  font-size:1.15em; font-weight:bold; color:#060d1a;
  cursor:pointer; letter-spacing:2px; margin-top:8px; transition:all .2s;
}
#startBtn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 0 28px #00ff8866; }
#startBtn:disabled { opacity:.3; cursor:not-allowed; }
#gw { display:none; flex-direction:column; align-items:center; }
#sb {
  display:flex; align-items:center; gap:20px;
  padding:8px 28px; background:#111827;
  border-radius:0 0 14px 14px; margin-bottom:6px;
}
.sct { display:flex; align-items:center; gap:8px; }
.scf { font-size:1.7em; }
.scn { font-size:2em; font-weight:bold; min-width:26px; text-align:center; }
#s1 { color:#4af; } #s2 { color:#fa4; }
#tmr { color:#aaa; font-size:1em; text-align:center; }
#ph { color:#00ff88; font-size:.68em; letter-spacing:2px; }
canvas { border-radius:12px; box-shadow:0 0 50px #00000099; display:block; }
#res {
  display:none; position:fixed; inset:0;
  background:#000b; flex-direction:column;
  align-items:center; justify-content:center; gap:18px; z-index:999;
}
#res h2 { font-size:2.6em; color:#00ff88; text-shadow:0 0 40px #00ff88; text-transform:uppercase; text-align:center; }
#fsc { font-size:2em; color:#fff; letter-spacing:8px; }
#rpBtn {
  background:#00ff88; border:none; border-radius:30px;
  padding:11px 38px; font-size:1.05em; font-weight:bold;
  color:#060d1a; cursor:pointer; margin-top:6px;
}
</style>
</head>
<body>

<div id="menu">
  <h1>⚽ MARBLE FOOTBALL</h1>
  <div class="slabel">ÉQUIPE 1</div>
  <div class="team-grid" id="g1"></div>
  <div class="slabel">ÉQUIPE 2</div>
  <div class="team-grid" id="g2"></div>
  <button id="startBtn" disabled onclick="startGame()">KICK OFF ▶</button>
</div>

<div id="gw">
  <div id="sb">
    <div class="sct"><span class="scf" id="f1">🇫🇷</span><span class="scn" id="s1">0</span></div>
    <div><div id="tmr">00:00</div><div id="ph">1ÈRE MI-TEMPS</div></div>
    <div class="sct"><span class="scn" id="s2">0</span><span class="scf" id="f2">🇧🇷</span></div>
  </div>
  <canvas id="c"></canvas>
</div>

<div id="res">
  <h2 id="wtxt"></h2>
  <div id="fsc"></div>
  <button id="rpBtn" onclick="goMenu()">🔄 REJOUER</button>
</div>

<script>
const TEAMS = [
  { name:"France",     flag:"🇫🇷", col:"#1a6bdb", bord:"#ffffff" },
  { name:"Brésil",    flag:"🇧🇷", col:"#22c45e", bord:"#f5d020" },
  { name:"Espagne",   flag:"🇪🇸", col:"#c8102e", bord:"#f9b200" },
  { name:"Allemagne", flag:"🇩🇪", col:"#3a3a3a", bord:"#f9b200" },
  { name:"Portugal",  flag:"🇵🇹", col:"#006600", bord:"#d62828" },
  { name:"Argentine", flag:"🇦🇷", col:"#74c0fc", bord:"#ffffff" },
  { name:"Maroc",     flag:"🇲🇦", col:"#c1121f", bord:"#006233" },
  { name:"Turquie",   flag:"🇹🇷", col:"#e63946", bord:"#ffffff" },
  { name:"Angleterre",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", col:"#cccccc", bord:"#cf142b" },
  { name:"Italie",    flag:"🇮🇹", col:"#003399", bord:"#009246" },
];

// Roles: 1 GK, 4 DEF, 3 MID, 3 ATT
// hx/hy = home position as fraction of field (0..1)
function buildRoles(side) {
  const flip = side === 'R';
  const f = x => flip ? 1-x : x;
  return [
    { type:'GK',  hx:f(0.04), hy:0.50 },
    { type:'DEF', hx:f(0.20), hy:0.18 },
    { type:'DEF', hx:f(0.20), hy:0.40 },
    { type:'DEF', hx:f(0.20), hy:0.62 },
    { type:'DEF', hx:f(0.20), hy:0.84 },
    { type:'MID', hx:f(0.44), hy:0.22 },
    { type:'MID', hx:f(0.44), hy:0.50 },
    { type:'MID', hx:f(0.44), hy:0.78 },
    { type:'ATT', hx:f(0.70), hy:0.22 },
    { type:'ATT', hx:f(0.70), hy:0.50 },
    { type:'ATT', hx:f(0.70), hy:0.78 },
  ];
}

let sel1=null, sel2=null;
function buildGrids() {
  ['g1','g2'].forEach((id,gi) => {
    const el=document.getElementById(id); el.innerHTML='';
    TEAMS.forEach((t,i) => {
      const d=document.createElement('div'); d.className='tcard';
      d.innerHTML=`<div class="fl">${t.flag}</div><div class="nm">${t.name}</div>`;
      d.onclick=()=>{
        el.querySelectorAll('.tcard').forEach(c=>c.classList.remove('sel'));
        d.classList.add('sel');
        if(gi===0) sel1=i; else sel2=i;
        document.getElementById('startBtn').disabled=(sel1===null||sel2===null||sel1===sel2);
      };
      el.appendChild(d);
    });
  });
}
buildGrids();

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function setSize(){
  const maxW=Math.min(window.innerWidth-16,860);
  const ratio=860/500;
  let W=maxW, H=maxW/ratio;
  const maxH=window.innerHeight-120;
  if(H>maxH){H=maxH;W=H*ratio;}
  canvas.width=Math.floor(W); canvas.height=Math.floor(H);
}
setSize();

function F(){
  const W=canvas.width,H=canvas.height;
  const px=W*0.07,py=H*0.1;
  const fw=W-px*2,fh=H-py*2;
  const gh=fh*0.3,gy=py+(fh-gh)/2,gw=W*0.025;
  return{W,H,px,py,fw,fh,cx:px+fw/2,cy:py+fh/2,
    GL:{x:px-gw,y:gy,w:gw,h:gh},
    GR:{x:px+fw, y:gy,w:gw,h:gh}};
}

let marbles=[],ball={};
let sc1=0,sc2=0,gTime=0,totalF=0;
let running=false,rafId=null,lastTs=0;
let flashT=0,kickWait=0;
const MR=()=>Math.floor(canvas.width*0.013);
const BR=()=>Math.floor(canvas.width*0.018);
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndS=()=>Math.random()>.5?1:-1;

function spawnMarbles(){
  const f=F(); marbles=[];
  const mr=MR();
  [buildRoles('L'),buildRoles('R')].forEach((roles,gi)=>{
    roles.forEach(role=>{
      marbles.push({
        x:f.px+role.hx*f.fw+rnd(-8,8),
        y:f.py+role.hy*f.fh+rnd(-8,8),
        vx:0,vy:0,
        ti:gi===0?sel1:sel2,
        role, side:gi===0?'L':'R', r:mr,
        wangle:Math.random()*Math.PI*2,
        wtimer:rnd(60,180),
      });
    });
  });
}

function resetBall(){
  const f=F();
  ball={x:f.cx,y:f.cy,vx:rnd(.7,1.6)*rndS(),vy:rnd(.7,1.6)*rndS(),r:BR()};
  kickWait=100;
}

function startGame(){
  if(sel1===null||sel2===null||sel1===sel2) return;
  setSize(); sc1=0;sc2=0;gTime=0; totalF=90*60; running=true; flashT=0;
  document.getElementById('s1').textContent=0;
  document.getElementById('s2').textContent=0;
  document.getElementById('f1').textContent=TEAMS[sel1].flag;
  document.getElementById('f2').textContent=TEAMS[sel2].flag;
  spawnMarbles(); resetBall();
  document.getElementById('menu').style.display='none';
  document.getElementById('gw').style.display='flex';
  if(rafId) cancelAnimationFrame(rafId);
  lastTs=0; rafId=requestAnimationFrame(loop);
}

function goMenu(){
  running=false; if(rafId) cancelAnimationFrame(rafId);
  sel1=null;sel2=null; buildGrids();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('res').style.display='none';
  document.getElementById('gw').style.display='none';
  document.getElementById('menu').style.display='flex';
}

function loop(ts){
  if(!running) return;
  const dt=lastTs===0?1:Math.min((ts-lastTs)/16.67,3);
  lastTs=ts; gTime+=dt;
  if(gTime>=totalF){endGame();return;}
  update(dt); draw();
  rafId=requestAnimationFrame(loop);
}

function update(dt){
  const pct=gTime/totalF;
  const mins=Math.floor(pct*90);
  const secs=Math.floor((pct*90-mins)*60);
  document.getElementById('tmr').textContent=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  document.getElementById('ph').textContent=pct<.5?'1ÈRE MI-TEMPS':'2ÈME MI-TEMPS';

  if(flashT>0){flashT-=dt;return;}
  if(kickWait>0){kickWait-=dt;return;}

  const f=F();

  // Find closest marble to ball per team
  const distToBall=m=>{ const dx=ball.x-m.x,dy=ball.y-m.y; return Math.sqrt(dx*dx+dy*dy); };
  const mL=marbles.filter(m=>m.side==='L');
  const mR=marbles.filter(m=>m.side==='R');
  const minDistL=Math.min(...mL.map(distToBall));
  const minDistR=Math.min(...mR.map(distToBall));

  marbles.forEach((m,idx)=>{
    const homeX=f.px+m.role.hx*f.fw;
    const homeY=f.py+m.role.hy*f.fh;
    const dBx=ball.x-m.x, dBy=ball.y-m.y;
    const dBall=Math.sqrt(dBx*dBx+dBy*dBy)||1;

    // Wander
    m.wtimer-=dt;
    if(m.wtimer<=0){ m.wangle+=rnd(-1.1,1.1); m.wtimer=rnd(60,200); }

    let ax=0,ay=0;

    if(m.role.type==='GK'){
      // GK tracks ball Y but stays near goal line
      const tY=Math.max(f.GL.y+10, Math.min(f.GL.y+f.GL.h-10, ball.y));
      ax+=(homeX-m.x)*0.1;
      ay+=(tY-m.y)*0.1;
      if(dBall<f.fw*0.2){ ax+=(dBx/dBall)*2.8; ay+=(dBy/dBall)*2.8; }
    } else {
      const myMin=m.side==='L'?minDistL:minDistR;
      // Only 1-2 nearest players chase ball, rest go home
      const chasing = dBall - myMin < 30 || dBall < f.fw*0.18;

      if(chasing){
        const spd = m.role.type==='ATT' ? 3.5 : m.role.type==='MID' ? 2.8 : 2.2;
        ax+=(dBx/dBall)*spd;
        ay+=(dBy/dBall)*spd;
      } else {
        // Return home + wander naturally
        ax+=(homeX-m.x)*0.06;
        ay+=(homeY-m.y)*0.06;
        ax+=Math.cos(m.wangle)*0.35;
        ay+=Math.sin(m.wangle)*0.35;
      }
    }

    // Repulsion from other marbles — STRONG to prevent clustering
    marbles.forEach((o,j)=>{
      if(j===idx) return;
      const dx=m.x-o.x, dy=m.y-o.y;
      const d=Math.sqrt(dx*dx+dy*dy)||0.01;
      const minSep=(m.r+o.r)*2.4;
      if(d<minSep){
        const force=(minSep-d)/minSep*3.0;
        ax+=(dx/d)*force; ay+=(dy/d)*force;
      }
    });

    const damp=m.role.type==='GK'?0.78:0.80;
    m.vx=(m.vx+ax*dt)*damp;
    m.vy=(m.vy+ay*dt)*damp;

    const maxSpd=m.role.type==='GK'?3:m.role.type==='ATT'?5:4;
    const sp=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
    if(sp>maxSpd){m.vx=m.vx/sp*maxSpd;m.vy=m.vy/sp*maxSpd;}

    m.x+=m.vx*dt; m.y+=m.vy*dt;

    if(m.x-m.r<f.px){m.x=f.px+m.r;m.vx*=-.6;}
    if(m.x+m.r>f.px+f.fw){m.x=f.px+f.fw-m.r;m.vx*=-.6;}
    if(m.y-m.r<f.py){m.y=f.py+m.r;m.vy*=-.6;}
    if(m.y+m.r>f.py+f.fh){m.y=f.py+f.fh-m.r;m.vy*=-.6;}

    // Marble→ball collision
    const minD=ball.r+m.r;
    if(dBall<minD&&dBall>0.01){
      const nx=dBx/dBall,ny=dBy/dBall;
      const ov=minD-dBall;
      ball.x+=nx*ov*.65;ball.y+=ny*ov*.65;
      m.x-=nx*ov*.35;m.y-=ny*ov*.35;
      const rv=(ball.vx-m.vx)*nx+(ball.vy-m.vy)*ny;
      if(rv<0){ball.vx-=rv*nx*1.4;ball.vy-=rv*ny*1.4;m.vx+=rv*nx*.35;m.vy+=rv*ny*.35;}
    }
  });

  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  ball.vx*=0.988; ball.vy*=0.988;

  if(ball.y-ball.r<f.py){ball.y=f.py+ball.r;ball.vy*=-.8;}
  if(ball.y+ball.r>f.py+f.fh){ball.y=f.py+f.fh-ball.r;ball.vy*=-.8;}

  if(ball.x-ball.r<f.px){
    if(ball.y>f.GL.y&&ball.y<f.GL.y+f.GL.h){sc2++;document.getElementById('s2').textContent=sc2;flashT=110;resetBall();}
    else{ball.x=f.px+ball.r;ball.vx*=-.85;}
  }
  if(ball.x+ball.r>f.px+f.fw){
    if(ball.y>f.GR.y&&ball.y<f.GR.y+f.GR.h){sc1++;document.getElementById('s1').textContent=sc1;flashT=110;resetBall();}
    else{ball.x=f.px+f.fw-ball.r;ball.vx*=-.85;}
  }
}

function draw(){
  const f=F();
  const{W,H,px,py,fw,fh,GL,GR}=f;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#060d1a'; ctx.fillRect(0,0,W,H);

  // Grass
  for(let i=0;i<9;i++){
    ctx.fillStyle=i%2===0?'#1a5c1a':'#1e6a1e';
    ctx.fillRect(px+i*(fw/9),py,fw/9,fh);
  }

  // Lines
  ctx.strokeStyle='#ffffffcc'; ctx.lineWidth=2.5;
  ctx.strokeRect(px,py,fw,fh);
  ctx.beginPath(); ctx.moveTo(px+fw/2,py); ctx.lineTo(px+fw/2,py+fh); ctx.stroke();
  ctx.beginPath(); ctx.arc(px+fw/2,py+fh/2,fh*.17,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px+fw/2,py+fh/2,3,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  // Penalty boxes
  const pbw=fw*.13,pbh=fh*.46;
  ctx.strokeRect(px,py+(fh-pbh)/2,pbw,pbh);
  ctx.strokeRect(px+fw-pbw,py+(fh-pbh)/2,pbw,pbh);
  const sbw=fw*.06,sbh=fh*.26;
  ctx.strokeRect(px,py+(fh-sbh)/2,sbw,sbh);
  ctx.strokeRect(px+fw-sbw,py+(fh-sbh)/2,sbw,sbh);

  // Goals
  ctx.fillStyle='#ffffff15';
  ctx.fillRect(GL.x,GL.y,GL.w,GL.h); ctx.fillRect(GR.x,GR.y,GR.w,GR.h);
  ctx.strokeStyle='#ffffffdd'; ctx.lineWidth=2;
  ctx.strokeRect(GL.x,GL.y,GL.w,GL.h); ctx.strokeRect(GR.x,GR.y,GR.w,GR.h);

  // Role shadows (home zones) - subtle
  marbles.forEach(m=>{
    const hx=f.px+m.role.hx*f.fw, hy=f.py+m.role.hy*f.fh;
    ctx.beginPath(); ctx.arc(hx,hy,m.r*1.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fill();
  });

  marbles.forEach(m=>drawMarble(m));
  drawBall();

  if(flashT>0){
    ctx.fillStyle=`rgba(255,215,0,${Math.min(flashT/55,.5)})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.font=`bold ${Math.floor(W*.08)}px Arial Black`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(255,255,255,${Math.min(flashT/45,.95)})`;
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=30;
    ctx.fillText('⚽  GOAL !',W/2,H/2);
    ctx.restore();
  }

  if(kickWait>0&&flashT<=0){
    ctx.fillStyle='rgba(0,0,0,.42)'; ctx.fillRect(0,0,W,H);
    const n=Math.ceil(kickWait/45);
    if(n>=1&&n<=3){
      ctx.font=`bold ${Math.floor(W*.13)}px Arial Black`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.fillText(n,W/2,H/2);
    }
  }
}

function drawMarble(m){
  const t=TEAMS[m.ti];
  ctx.beginPath(); ctx.arc(m.x+2,m.y+3,m.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();
  const g=ctx.createRadialGradient(m.x-m.r*.35,m.y-m.r*.35,m.r*.05,m.x,m.y,m.r);
  g.addColorStop(0,lighten(t.col,65)); g.addColorStop(1,t.col);
  ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle=t.bord; ctx.lineWidth=1.6; ctx.stroke();
  // GK gold ring
  if(m.role.type==='GK'){
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r+3,0,Math.PI*2);
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.2; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(m.x-m.r*.3,m.y-m.r*.3,m.r*.27,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.38)'; ctx.fill();
  ctx.font=`${m.r}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t.flag,m.x,m.y+1);
}

function drawBall(){
  const b=ball;
  ctx.beginPath(); ctx.arc(b.x+2,b.y+3,b.r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle='#f0f0f0'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1; ctx.stroke();
  [[0,-.44],[.38,.2],[-.38,.2]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(b.x+dx*b.r*2,b.y+dy*b.r*2,b.r*.23,0,Math.PI*2);
    ctx.fillStyle='#1a1a1a'; ctx.fill();
  });
  ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.28,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fill();
}

function lighten(hex,amt){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return `rgb(${r},${g},${b})`;
}

function endGame(){
  running=false; cancelAnimationFrame(rafId);
  const t1=TEAMS[sel1],t2=TEAMS[sel2];
  document.getElementById('wtxt').textContent=
    sc1>sc2?`${t1.flag} ${t1.name} WINS !`:sc2>sc1?`${t2.flag} ${t2.name} WINS !`:'🤝 MATCH NUL';
  document.getElementById('fsc').textContent=`${sc1}  —  ${sc2}`;
  document.getElementById('res').style.display='flex';
}
</script>
</body>
</html>
